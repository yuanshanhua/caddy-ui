name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  check-and-build:
    name: Check & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check
        run: pnpm check

      - name: Build
        run: pnpm build

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start Caddy
        run: |
          echo '{"admin":{"listen":":2019","enforce_origin":false}}' > /tmp/caddy.json
          docker run -d --name caddy-test -p 12019:2019 \
            -v /tmp/caddy.json:/etc/caddy/caddy.json:ro \
            caddy:2 caddy run --config /etc/caddy/caddy.json
          for i in $(seq 1 30); do
            if curl -sf http://localhost:12019/config/ > /dev/null 2>&1; then
              echo "Caddy is ready"
              break
            fi
            sleep 1
          done

      - name: Run integration tests
        run: pnpm test:integration
        env:
          CADDY_TEST_URL: http://localhost:12019

      - name: Stop Caddy
        if: always()
        run: docker rm -f caddy-test || true
